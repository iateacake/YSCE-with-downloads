name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ master ]

# Added top-level permissions block for GitHub Actions cache access
permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Checkout your forked YSCE repository
    - name: Checkout YSCE
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Checkout the public library into the expected directory structure
    - name: Checkout Public Repository
      uses: actions/checkout@v4
      with:
        repository: 'YSCEDC/ysce_public'
        path: 'ysce_public'

    # 3. Setup and run vcpkg
    - name: Run vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: '**/src/vcpkg.json'
        vcpkgGitCommitId: 5b1214315250939257ef5d62ecdcbca18cf4fb1c
      env:
        ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_CACHE_URL: ${{ github.api_url }}/_apis/artifactcache/

    # 4. Configure CMake
    - name: Configure CMake
      run: |
        cmake -B ci_windows -S src `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
      env:
        ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_CACHE_URL: ${{ github.api_url }}/_apis/artifactcache/

    # 5. Compile selected targets
    - name: Build Targets
      run: |
        cmake --build ci_windows --config Release --parallel --target ysflight64_gl1 ysflight64_gl2 ysflight64_gl1demo ysflight64_gl2demo ysflight64_nownd

    # 6. Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ys-build-windows
        path: ./ci_windows/main/Release
        retention-days: 14

        

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgArguments: --triplet x64-linux
        vcpkgGitCommitId: 5b1214315250939257ef5d62ecdcbca18cf4fb1c
      env:
        ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_CACHE_URL: ${{ github.api_url }}/_apis/artifactcache/

    - name: Install dependencies
      run: vcpkg install --triplet x64-linux
      working-directory: src
    - name: checkout_public
      run: git clone https://github.com/YSCEDC/ysce_public.git
    - name: mkdir
      run: mkdir ci_ubuntu
    - name: apt-get-update
      run: sudo apt-get update
    - name: install-OpenGL
      run: sudo apt-get install libglu1-mesa-dev mesa-common-dev
    - name: install-ALSA
      run: sudo apt-get install libasound2t64 libasound2-dev
    - name: install-PulseAudio
      run: sudo apt-get install pulseaudio libpulse-dev
    - name: install-Python
      run: sudo apt-get install python3 python-is-python3
    - name: cmake
      run: cmake ../src -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/home/runner/work/YSCE/YSCE/vcpkg/installed/x64-linux -DCMAKE_TOOLCHAIN_FILE=/home/runner/work/YSCE/YSCE/vcpkg/scripts/buildsystems/vcpkg.cmake
      working-directory: ./ci_ubuntu
    - name: build
      run: cmake --build . --config Release --parallel --target ysflight64_gl1 ysflight64_gl2 ysflight64_gl1demo ysflight64_gl2demo ysflight64_nownd
      working-directory: ./ci_ubuntu
    - uses: actions/upload-artifact@v4
      with:
        name: ys-build-linux
        path: ./ci_ubuntu/main/
        retention-days: 14
