name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ master ]

# Added top-level permissions block for GitHub Actions cache access
permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Checkout your forked YSCE repository
    - name: Checkout YSCE
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Checkout the public library into the expected directory structure
    - name: Checkout Public Repository
      uses: actions/checkout@v4
      with:
        repository: 'YSCEDC/ysce_public'
        path: 'ysce_public'

    # 3. Setup and run vcpkg
    - name: Run vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: '**/src/vcpkg.json'
        vcpkgGitCommitId: c0948694cceff995e5cf90b751e0c5a95d613458
      env:
        ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_CACHE_URL: ${{ github.api_url }}/_apis/artifactcache/

    # 4. Configure CMake
    - name: Configure CMake
      run: |
        cmake -B ci_windows -S src `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
      env:
        ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ACTIONS_CACHE_URL: ${{ github.api_url }}/_apis/artifactcache/

    # 5. Compile selected targets
    - name: Build Targets
      run: |
        cmake --build ci_windows --config Release --parallel --target ysflight64_gl1 ysflight64_gl2 ysflight64_gl1demo ysflight64_gl2demo ysflight64_nownd

    # 6. Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ys-build-windows
        path: ./ci_windows/main/Release
        retention-days: 14
